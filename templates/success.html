<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>決済完了｜神楽タロット</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Zen+Antique&display=swap" rel="stylesheet">
  <style>
    :root{--gold:#C9A84C;--gold-grad:linear-gradient(135deg,#8B6914,#C9A84C,#FFE08A,#C9A84C,#8B6914);--ink:#030308;--ivory:#EDE0C4;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{font-family:'Noto Serif JP',serif;background:var(--ink);color:var(--ivory);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    #sf{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .st{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) var(--dl,0s) infinite ease-in-out;}
    @keyframes tw{0%,100%{opacity:.08;transform:scale(.7);}50%{opacity:.6;transform:scale(1.2);}}
    @keyframes shim{0%{background-position:0% center;}100%{background-position:200% center;}}
    @keyframes rise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .card{position:relative;z-index:1;max-width:420px;width:90%;text-align:center;border:1px solid rgba(201,168,76,.25);border-radius:24px;padding:52px 32px;background:rgba(255,255,255,.03);animation:rise .7s ease;}
    .icon{font-size:3rem;margin-bottom:20px;display:block;}
    h1{font-family:'Zen Antique',serif;font-size:1.4rem;background:var(--gold-grad);background-size:200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shim 4s linear infinite;letter-spacing:.15em;margin-bottom:16px;}
    p{font-size:.88rem;line-height:2.2;color:rgba(237,224,196,.6);margin-bottom:10px;}
    .sub{font-size:.75rem;color:rgba(237,224,196,.3);margin-top:24px;line-height:1.9;}
    .back{display:inline-block;margin-top:32px;padding:13px 32px;border:1px solid rgba(201,168,76,.35);border-radius:10px;color:var(--gold);font-size:.82rem;letter-spacing:.1em;text-decoration:none;transition:background .2s;}
    .back:hover{background:rgba(201,168,76,.08);}
  </style>
</head>
<body>
<div id="sf"></div>
<div class="card">
  <span class="icon">🔮</span>
  <h1>決済完了</h1>
  <p>ご購入ありがとうございます。</p>
  <p>「あの人の隠れた本音」と<br>「二人の最終的な結末」を<br>ただいま生成しています。</p>
  <p class="sub">30分以内にご登録のメールアドレスへ<br>完全鑑定書をお届けします。<br>迷惑メールフォルダもご確認ください。</p>
  <a href="/" class="back">← トップに戻る</a>
</div>
<script>
  const sf=document.getElementById('sf');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');s.className='st';
    const sz=Math.random()*1.8+.3;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${(Math.random()*4+2).toFixed(1)}s;--dl:${(Math.random()*5).toFixed(1)}s;`;
    sf.appendChild(s);
  }
</script>
</body>
</html>
